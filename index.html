<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="منصة رصد وتتبع العطاءات الحكومية الليبية — ابحث وصنّف العطاءات حسب اهتماماتك">
  <title>متتبع العطاءات الحكومية الليبية</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <img src="assets/Government_of_National_Unity_Libya.svg" alt="شعار الدولة">
    </div>
    <div>
      <h1>متتبع العطاءات الحكومية</h1>
      <span>منصة العطاءات — ليبيا</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="badge" id="lastUpdate">لم يتم التحديث</div>
    <button class="theme-toggle" id="themeToggle" aria-label="تبديل المظهر" onclick="toggleTheme()">
      <!-- Icon will be injected by JS -->
    </button>
  </div>
</header>

<main class="container">

  <!-- Keywords Panel -->
  <section class="panel" aria-label="الكلمات المفتاحية">
    <h2 class="panel-title">الكلمات المفتاحية</h2>
    <div class="chips" id="chips"></div>
    <div class="input-row">
      <input type="text" id="kwIn" placeholder="مثال: شبكة، برمجيات، طرق، كهرباء..." aria-label="إضافة كلمة مفتاحية">
      <button onclick="addKw()">إضافة</button>
    </div>
    <div class="action-row">
      <div class="btn-group">
        <button id="fetchBtn" onclick="fetchTenders()">جلب العطاءات</button>
        <button class="btn-secondary" onclick="clearAll()">مسح الكل</button>
      </div>
      <!-- Status -->
      <div class="status-bar" role="status" aria-live="polite">
        <span class="status-dot" id="dot"></span>
        <span id="statusTxt">أدخل كلماتك المفتاحية ثم اضغط "جلب العطاءات"</span>
      </div>
    </div>
    <div class="progress" id="prog"><div class="progress-fill" id="progFill"></div></div>
  </section>

  <!-- Error -->
  <div class="error-box" id="errBox" role="alert"></div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-value" id="sTotal">—</span>
      <span class="stat-label">إجمالي العطاءات</span>
    </div>
    <div class="stat-card">
      <span class="stat-value green" id="sMatch">—</span>
      <span class="stat-label">تطابق مع اهتماماتك</span>
    </div>
    <div class="stat-card">
      <span class="stat-value blue" id="sTech">—</span>
      <span class="stat-label">عطاءات تقنية</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="sOpen">—</span>
      <span class="stat-label">مفتوحة حالياً</span>
    </div>
  </div>

  <!-- Category Tabs -->
  <nav class="category-tabs" id="catTabs" aria-label="تصنيفات العطاءات"></nav>

  <!-- Results Header & Filters -->
  <div class="results-header">
    <div class="section-title" id="secTitle">نتائج العطاءات</div>
    <div class="filters-bar">
      <label for="filt">عرض:</label>
      <select id="filt" onchange="render()">
        <option value="all">جميع العطاءات</option>
        <option value="match">المطابقة فقط</option>
        <option value="open">المفتوحة فقط</option>
      </select>
      <select id="sort" onchange="render()" aria-label="ترتيب النتائج">
        <option value="match">الأكثر تطابقاً</option>
        <option value="date">الأحدث أولاً</option>
        <option value="alpha">أبجدي</option>
      </select>
    </div>
  </div>
  <div class="results-grid" id="grid">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <h3>في انتظار الجلب</h3>
      <p>أضف كلماتك المفتاحية واضغط جلب العطاءات</p>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
