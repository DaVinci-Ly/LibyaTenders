<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متتبع العطاءات الحكومية الليبية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #e05c1a;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .logo span { font-size: 12px; color: var(--muted); display: block; }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .controls h2 { font-size: 14px; color: var(--muted); margin-bottom: 16px; font-weight: 600; letter-spacing: 0.5px; }

  .keywords-section { margin-bottom: 16px; }
  .keywords-section label { display: block; font-size: 13px; color: var(--text); margin-bottom: 8px; font-weight: 600; }

  .keyword-chips {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
  }

  .chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(240,165,0,0.15);
    border: 1px solid rgba(240,165,0,0.4);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px; color: var(--accent);
    cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { background: rgba(240,165,0,0.25); }
  .chip .remove { font-size: 16px; line-height: 1; opacity: 0.7; }

  .input-row { display: flex; gap: 8px; }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  button:hover { background: #e09500; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .action-row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .status-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .dot.orange { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 900; color: var(--accent); }
  .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .tender-grid { display: flex; flex-direction: column; gap: 12px; }

  .tender-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .tender-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .tender-card.matched { border-right: 3px solid var(--green); }

  .tender-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

  .tender-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.5; flex: 1; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }

  .tag {
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag.matched-kw { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .tag.entity { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .tag.status-open { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .tag.status-closed { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }

  .tender-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 8px; }
  .tender-meta span { display: flex; align-items: center; gap: 4px; }

  .highlight { background: rgba(240,165,0,0.25); color: var(--accent); border-radius: 3px; padding: 0 2px; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s;
  }

  .filter-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .filter-row select:focus { border-color: var(--accent); }

  .section-title {
    font-size: 13px; color: var(--muted); font-weight: 600;
    letter-spacing: 0.5px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .link-btn {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--blue);
    text-decoration: none;
    cursor: pointer;
  }
  .link-btn:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div>
      <h1>متتبع العطاءات</h1>
      <span>منصة العطاءات الحكومية الليبية</span>
    </div>
  </div>
  <div class="badge" id="lastUpdate">لم يتم الجلب بعد</div>
</header>

<div class="container">

  <!-- Controls -->
  <div class="controls">
    <h2>⚙️ إعدادات البحث والتصفية</h2>

    <div class="keywords-section">
      <label>🔑 الكلمات المفتاحية (عطاءات تهمني)</label>
      <div class="keyword-chips" id="chips"></div>
      <div class="input-row">
        <input type="text" id="kwInput" placeholder="أضف كلمة مفتاحية... مثال: حفر، أنابيب، مياه" />
        <button onclick="addKeyword()">+ أضف</button>
      </div>
    </div>

    <div class="action-row">
      <button onclick="fetchTenders()" id="fetchBtn">🔍 جلب العطاءات الآن</button>
      <button class="btn-secondary" onclick="clearResults()">🗑️ مسح النتائج</button>
      <span id="autoStatus" style="font-size:12px; color: var(--muted);"></span>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">أدخل كلماتك المفتاحية ثم اضغط "جلب العطاءات"</span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="totalCount">—</div>
      <div class="lbl">إجمالي العطاءات</div>
    </div>
    <div class="stat-card">
      <div class="num" id="matchCount" style="color: var(--green)">—</div>
      <div class="lbl">تطابق مع اهتماماتك</div>
    </div>
    <div class="stat-card">
      <div class="num" id="openCount" style="color: var(--blue)">—</div>
      <div class="lbl">عطاءات مفتوحة</div>
    </div>
  </div>

  <!-- Filter row -->
  <div class="filter-row">
    <span style="font-size:13px; color: var(--muted);">عرض:</span>
    <select id="filterSelect" onchange="renderTenders()">
      <option value="all">جميع العطاءات</option>
      <option value="matched">المطابقة فقط</option>
      <option value="open">المفتوحة فقط</option>
    </select>
    <select id="sortSelect" onchange="renderTenders()">
      <option value="match">الأكثر تطابقًا أولاً</option>
      <option value="date">الأحدث أولاً</option>
      <option value="alpha">أبجدي</option>
    </select>
  </div>

  <!-- Results -->
  <div class="section-title">نتائج العطاءات</div>
  <div id="errorMsg" class="error-msg" style="display:none;"></div>
  <div class="tender-grid" id="results">
    <div class="empty-state">
      <div class="icon">🏛️</div>
      <h3>في انتظار الجلب</h3>
      <p>أضف كلماتك المفتاحية واضغط "جلب العطاءات"</p>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let keywords = JSON.parse(localStorage.getItem('tenderKeywords') || '["صرف صحي","قناة","صرف","مياه","بنية تحتية"]');
let allTenders = [];
let lastFetchTime = null;

// ── Keyword Management ─────────────────────────────────
function saveKeywords() {
  localStorage.setItem('tenderKeywords', JSON.stringify(keywords));
}

function renderChips() {
  const container = document.getElementById('chips');
  container.innerHTML = keywords.map((kw, i) => `
    <div class="chip" onclick="removeKeyword(${i})">
      ${kw} <span class="remove">×</span>
    </div>
  `).join('');
}

function addKeyword() {
  const input = document.getElementById('kwInput');
  const val = input.value.trim();
  if (val && !keywords.includes(val)) {
    keywords.push(val);
    saveKeywords();
    renderChips();
    if (allTenders.length > 0) renderTenders();
  }
  input.value = '';
  input.focus();
}

function removeKeyword(i) {
  keywords.splice(i, 1);
  saveKeywords();
  renderChips();
  if (allTenders.length > 0) renderTenders();
}

document.getElementById('kwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addKeyword();
});

// ── Fetch via Claude AI (CORS proxy) ───────────────────
async function fetchTenders() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  setStatus('orange', 'جارٍ جلب العطاءات من المنصة...');
  showProgress(10);
  document.getElementById('errorMsg').style.display = 'none';

  try {
    // Use Claude AI to fetch and parse the tenders site
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 4000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: `أنت مساعد متخصص في جلب بيانات العطاءات الحكومية الليبية من موقع https://www.attaat.pm.gov.ly/
استخرج جميع العطاءات المتاحة وأرجعها بصيغة JSON فقط بدون أي نص إضافي أو backticks.
الصيغة المطلوبة:
[
  {
    "id": "رقم العطاء أو معرف فريد",
    "title": "عنوان العطاء",
    "entity": "اسم الجهة الحكومية",
    "category": "التصنيف",
    "publishDate": "تاريخ النشر",
    "deadline": "آخر موعد للتقديم",
    "status": "مفتوح أو مغلق",
    "description": "وصف مختصر",
    "url": "رابط العطاء إن وجد"
  }
]
ابحث عن العطاءات في الموقع وأرجع كل ما تجده.`,
        messages: [{
          role: "user",
          content: "ابحث في موقع https://www.attaat.pm.gov.ly/ واستخرج جميع العطاءات المتاحة حالياً وأرجعها بصيغة JSON فقط."
        }]
      })
    });

    showProgress(60);

    const data = await response.json();
    const fullText = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    showProgress(80);

    // Try to parse JSON from response
    const jsonMatch = fullText.match(/\[[\s\S]*\]/);
    if (jsonMatch) {
      allTenders = JSON.parse(jsonMatch[0]);
      lastFetchTime = new Date();
      document.getElementById('lastUpdate').textContent = 'آخر تحديث: ' + lastFetchTime.toLocaleTimeString('ar-LY');
      showProgress(100);
      setStatus('green', `تم جلب ${allTenders.length} عطاء بنجاح`);
      updateStats();
      renderTenders();
    } else {
      // If no JSON, try to extract information manually
      allTenders = extractTendersFromText(fullText);
      if (allTenders.length > 0) {
        lastFetchTime = new Date();
        document.getElementById('lastUpdate').textContent = 'آخر تحديث: ' + lastFetchTime.toLocaleTimeString('ar-LY');
        showProgress(100);
        setStatus('green', `تم استخراج ${allTenders.length} عطاء`);
        updateStats();
        renderTenders();
      } else {
        throw new Error('لم يتم العثور على بيانات منظمة. ' + fullText.substring(0, 300));
      }
    }

  } catch (err) {
    setStatus('', 'حدث خطأ أثناء الجلب');
    showError('خطأ: ' + err.message + '\n\nملاحظة: قد يكون الموقع لا يسمح بالوصول من المتصفح مباشرة. جرب تشغيل الملف على خادم محلي أو استخدم نسخة Python التي تتجاوز هذا القيد.');
    console.error(err);
  } finally {
    btn.disabled = false;
    setTimeout(() => hideProgress(), 1000);
  }
}

function extractTendersFromText(text) {
  // Fallback: try to parse semi-structured text
  const tenders = [];
  const lines = text.split('\n').filter(l => l.trim().length > 20);
  lines.forEach((line, i) => {
    if (line.includes('عطاء') || line.includes('مناقصة') || line.includes('توريد') || line.includes('إنشاء')) {
      tenders.push({
        id: 'T' + (i + 1),
        title: line.trim(),
        entity: 'جهة حكومية',
        category: 'عام',
        publishDate: new Date().toLocaleDateString('ar-LY'),
        deadline: '',
        status: 'مفتوح',
        description: '',
        url: 'https://www.attaat.pm.gov.ly/'
      });
    }
  });
  return tenders;
}

// ── Matching ──────────────────────────────────────────
function matchTender(tender) {
  if (keywords.length === 0) return { matched: false, matchedKws: [] };
  const text = [tender.title, tender.description, tender.category, tender.entity].join(' ').toLowerCase();
  const matchedKws = keywords.filter(kw => text.includes(kw.toLowerCase()));
  return { matched: matchedKws.length > 0, matchedKws };
}

function highlightText(text, kws) {
  if (!text) return '';
  let result = text;
  kws.forEach(kw => {
    const re = new RegExp(kw, 'gi');
    result = result.replace(re, `<span class="highlight">${kw}</span>`);
  });
  return result;
}

// ── Render ─────────────────────────────────────────────
function renderTenders() {
  const filter = document.getElementById('filterSelect').value;
  const sort = document.getElementById('sortSelect').value;
  const container = document.getElementById('results');

  if (allTenders.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>لا توجد عطاءات</h3><p>اضغط "جلب العطاءات" للحصول على البيانات</p></div>`;
    return;
  }

  let list = allTenders.map(t => ({ ...t, match: matchTender(t) }));

  // Filter
  if (filter === 'matched') list = list.filter(t => t.match.matched);
  if (filter === 'open') list = list.filter(t => t.status === 'مفتوح' || t.status?.toLowerCase() === 'open');

  // Sort
  if (sort === 'match') list.sort((a, b) => b.match.matchedKws.length - a.match.matchedKws.length);
  if (sort === 'date') list.sort((a, b) => new Date(b.publishDate || 0) - new Date(a.publishDate || 0));
  if (sort === 'alpha') list.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ar'));

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔎</div><h3>لا توجد نتائج</h3><p>جرب تغيير الفلتر أو إضافة كلمات مفتاحية مختلفة</p></div>`;
    return;
  }

  container.innerHTML = list.map(t => {
    const isOpen = t.status === 'مفتوح' || t.status?.toLowerCase() === 'open';
    const kws = t.match.matchedKws;
    const titleHtml = highlightText(t.title || 'بدون عنوان', kws);
    const descHtml = highlightText(t.description || '', kws);

    return `
    <div class="tender-card ${t.match.matched ? 'matched' : ''}">
      <div class="tender-header">
        <div class="tender-title">${titleHtml}</div>
        <div class="tags">
          ${t.match.matched ? `<span class="tag matched-kw">✓ ${kws.length} تطابق</span>` : ''}
          <span class="tag ${isOpen ? 'status-open' : 'status-closed'}">${t.status || '—'}</span>
          ${t.entity ? `<span class="tag entity">${t.entity}</span>` : ''}
        </div>
      </div>
      ${descHtml ? `<p style="font-size:13px; color: var(--muted); margin-top:6px; line-height:1.6;">${descHtml}</p>` : ''}
      <div class="tender-meta">
        ${t.id ? `<span>🔢 ${t.id}</span>` : ''}
        ${t.publishDate ? `<span>📅 النشر: ${t.publishDate}</span>` : ''}
        ${t.deadline ? `<span>⏰ آخر موعد: ${t.deadline}</span>` : ''}
        ${t.category ? `<span>📁 ${t.category}</span>` : ''}
      </div>
      ${t.url ? `<a class="link-btn" href="${t.url}" target="_blank">🔗 فتح العطاء في الموقع ↗</a>` : ''}
    </div>`;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────
function updateStats() {
  document.getElementById('totalCount').textContent = allTenders.length;
  const matched = allTenders.filter(t => matchTender(t).matched).length;
  document.getElementById('matchCount').textContent = matched;
  const open = allTenders.filter(t => t.status === 'مفتوح' || t.status?.toLowerCase() === 'open').length;
  document.getElementById('openCount').textContent = open;
}

function clearResults() {
  allTenders = [];
  document.getElementById('results').innerHTML = `<div class="empty-state"><div class="icon">🏛️</div><h3>في انتظار الجلب</h3><p>أضف كلماتك المفتاحية واضغط "جلب العطاءات"</p></div>`;
  document.getElementById('totalCount').textContent = '—';
  document.getElementById('matchCount').textContent = '—';
  document.getElementById('openCount').textContent = '—';
  setStatus('', 'تم مسح النتائج');
}

// ── UI Helpers ─────────────────────────────────────────
function setStatus(type, msg) {
  document.getElementById('statusDot').className = 'dot ' + type;
  document.getElementById('statusText').textContent = msg;
}

function showProgress(pct) {
  const bar = document.getElementById('progressBar');
  bar.style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
}

function hideProgress() {
  document.getElementById('progressBar').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  el.style.whiteSpace = 'pre-wrap';
  el.textContent = msg;
}

// ── Init ──────────────────────────────────────────────
renderChips();
</script>
